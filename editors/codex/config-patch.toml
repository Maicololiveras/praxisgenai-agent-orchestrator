# Codex Config Patch
#
# Add these entries to your ~/.codex/config.toml (or %APPDATA%/codex/config.toml on Windows).
#
# If you already have model_instructions_file, APPEND the orchestrator content
# to your existing instructions file instead of replacing it.
#
# If you already have [mcp_servers.engram], skip that section.

# Point Codex to the orchestrator instructions file.
# Option A: Use the installed copy directly
# model_instructions_file = "~/.codex/orchestrator-instructions.md"
#
# Option B: If you have a combined instructions file, append orchestrator-instructions.md content to it.

# Engram MCP server (required for persistent memory across sessions)
[mcp_servers.engram]
command = "engram"
args = ["mcp", "--tools=agent"]
